name: RAG Regression Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Unit Tests (no API key required)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no API)
        run: |
          pytest tests/test_regression.py \
            -v \
            -k "collection or rag_returns" \
            --tb=short

  # ─────────────────────────────────────────────
  # Integration + Baseline Regression Gate
  # ─────────────────────────────────────────────
  integration-regression:
    name: Integration & Regression Gate
    runs-on: ubuntu-latest
    needs: unit-tests

    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Run pytest (integration + logging metrics)
      - name: Run regression tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pytest tests/test_regression.py \
            -v \
            --tb=short \
            --junit-xml=reports/test-results.xml

      # ✅ Baseline regression check (NEW)
      - name: Run baseline regression gate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BASELINE_PATH: evaluation/baseline.json
        run: |
          python - <<'EOF'
          import os, sys, json
          sys.path.insert(0, ".")

          from rag.pipeline import run_rag
          from rag.ingest import ingest_sample_documents
          from observability.store import get_percentile_latency, get_summary_stats
          from evaluation.regression_gate import run_gate

          TEST_QUERIES = [
              "What is artificial intelligence?",
              "What is machine learning?",
              "Explain deep learning."
          ]

          print("📚 Ingesting documents...")
          ingest_sample_documents()

          print("🧪 Running queries...")
          for q in TEST_QUERIES:
              run_rag(q, eval_quality=True)

          print("📊 Collecting metrics...")
          lat = get_percentile_latency()
          stats = get_summary_stats()

          summary = {
              "p95_latency_ms": lat["p95"],
              "avg_quality": stats.get("avg_quality"),
              "avg_faithfulness": stats.get("avg_faithfulness"),
              "avg_answer_relevancy": stats.get("avg_relevancy"),
              "avg_context_precision": stats.get("avg_precision"),
          }

          print(json.dumps(summary, indent=2))

          baseline_path = os.environ["BASELINE_PATH"]

          if not os.path.exists(baseline_path):
              raise RuntimeError(
                  "❌ baseline.json missing. Generate it locally and commit."
              )

          with open(baseline_path) as f:
              baseline = json.load(f)

          print("🚦 Running regression gate...")
          gate = run_gate(**summary, baseline=baseline)

          print(gate.to_json())

          if not gate.passed:
              print("❌ Regression detected!")
              sys.exit(1)

          print("✅ Passed baseline regression gate!")
          EOF

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-results
          path: reports/test-results.xml

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';

            const body = `## ${icon} RAG Regression Gate — ${status.toUpperCase()}

            | Check | Result |
            |-------|--------|
            | Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Integration & Regression | ${status === 'success' ? '✅ Passed' : '❌ Failed'} |

            Baseline comparison enforced.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });